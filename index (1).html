<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hotel ERP Login Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1e3a5f, #1a7f5a);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    header h1 { font-size: 22px; font-weight: 700; }
    header p { font-size: 13px; color: #94a3b8; margin-top: 2px; }
    .icon { font-size: 32px; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 32px;
      border: 1px solid #334155;
    }
    .card h2 {
      font-size: 16px;
      font-weight: 600;
      color: #7dd3fc;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; color: #94a3b8; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    input {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 14px;
      color: #e2e8f0;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #3b82f6; }
    input::placeholder { color: #475569; }

    .btn-run {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: linear-gradient(135deg, #2563eb, #1a7f5a);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-run:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Summary */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-item {
      background: #0f172a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      border: 1px solid #334155;
    }
    .summary-item .num { font-size: 36px; font-weight: 700; }
    .summary-item .lbl { font-size: 12px; color: #94a3b8; margin-top: 4px; text-transform: uppercase; }
    .num.total { color: #7dd3fc; }
    .num.passed { color: #4ade80; }
    .num.failed { color: #f87171; }

    /* Results */
    .result-card {
      background: #0f172a;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid #334155;
      overflow: hidden;
    }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
    }
    .result-header:hover { background: #1e293b; }
    .result-left { display: flex; align-items: center; gap: 12px; }
    .tc-id { font-size: 12px; font-weight: 600; color: #7dd3fc; background: #1e3a5f; padding: 4px 10px; border-radius: 20px; }
    .tc-name { font-size: 14px; font-weight: 500; }
    .badge {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .badge.PASS { background: #14532d; color: #4ade80; }
    .badge.FAIL { background: #7f1d1d; color: #f87171; }
    .badge.ERROR { background: #78350f; color: #fbbf24; }

    .result-details {
      padding: 0 18px 16px;
      display: none;
      border-top: 1px solid #1e293b;
    }
    .result-details.open { display: block; }
    .detail-row {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #1e293b;
      font-size: 13px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #64748b; min-width: 90px; font-weight: 500; }
    .detail-value { color: #cbd5e1; }
    .detail-value.correct { color: #4ade80; }
    .detail-value.wrong { color: #f87171; }
    .detail-value.blank { color: #94a3b8; }

    #results-section { display: none; }
    .arrow { color: #64748b; transition: transform 0.2s; font-size: 12px; }
    .result-header.open .arrow { transform: rotate(180deg); }
  </style>
</head>
<body>

<header>
  <div class="icon">🏨</div>
  <div>
    <h1>Hotel ERP Login Tester</h1>
    <p>Automated Login Test — Powered by Playwright</p>
  </div>
</header>

<div class="container">
  <div class="card">
    <h2>⚙️ Test Configuration</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Login Page URL</label>
        <input type="text" id="base_url" placeholder="https://demo.hotelsetting.com/login" value="https://demo.hotelsetting.com/login"/>
      </div>
      <div class="form-group">
        <label>Valid Email</label>
        <input type="text" id="valid_email" placeholder="admin@gmail.com" value="admin@gmail.com"/>
      </div>
      <div class="form-group">
        <label>Valid Password</label>
        <input type="text" id="valid_password" placeholder="12345678" value="12345678"/>
      </div>
      <div class="form-group full">
        <label>Login Button XPath</label>
        <input type="text" id="login_btn" placeholder="/html/body/div/.../button" value="/html/body/div/div/div/div/div/div[2]/div[1]/div/div[1]/form/fieldset/div[2]/button/span"/>
      </div>
    </div>
    <button class="btn-run" id="runBtn" onclick="runTests()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">▶ Run Login Tests</span>
    </button>
  </div>

  <div id="results-section">
    <div class="summary-bar">
      <div class="summary-item">
        <div class="num total" id="s-total">0</div>
        <div class="lbl">Total Tests</div>
      </div>
      <div class="summary-item">
        <div class="num passed" id="s-passed">0</div>
        <div class="lbl">Passed</div>
      </div>
      <div class="summary-item">
        <div class="num failed" id="s-failed">0</div>
        <div class="lbl">Failed</div>
      </div>
    </div>
    <div id="results-list"></div>
  </div>
</div>

<script>
async function runTests() {
  const btn = document.getElementById("runBtn");
  const spinner = document.getElementById("spinner");
  const btnText = document.getElementById("btnText");

  btn.disabled = true;
  spinner.style.display = "block";
  btnText.textContent = "Running Tests...";
  document.getElementById("results-section").style.display = "none";

  const payload = {
    base_url: document.getElementById("base_url").value,
    valid_email: document.getElementById("valid_email").value,
    valid_password: document.getElementById("valid_password").value,
    login_btn: document.getElementById("login_btn").value,
  };

  try {
    const res = await fetch("/run-test", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.error) {
      alert("Error: " + data.error);
      return;
    }

    document.getElementById("s-total").textContent = data.summary.total;
    document.getElementById("s-passed").textContent = data.summary.passed;
    document.getElementById("s-failed").textContent = data.summary.failed;

    const list = document.getElementById("results-list");
    list.innerHTML = "";

    data.results.forEach((r, i) => {
      const emailClass = r.email.includes("WRONG") ? "wrong" : r.email.includes("BLANK") ? "blank" : "correct";
      const passClass = r.password.includes("WRONG") ? "wrong" : r.password.includes("BLANK") ? "blank" : "correct";

      list.innerHTML += `
        <div class="result-card">
          <div class="result-header" id="hdr-${i}" onclick="toggle(${i})">
            <div class="result-left">
              <span class="tc-id">${r.id}</span>
              <span class="tc-name">${r.name}</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="badge ${r.status}">${r.status}</span>
              <span class="arrow" id="arr-${i}">▼</span>
            </div>
          </div>
          <div class="result-details" id="det-${i}">
            <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value ${emailClass}">${r.email}</span></div>
            <div class="detail-row"><span class="detail-label">Password</span><span class="detail-value ${passClass}">${r.password}</span></div>
            <div class="detail-row"><span class="detail-label">Expected</span><span class="detail-value">${r.expected}</span></div>
            <div class="detail-row"><span class="detail-label">Result</span><span class="detail-value">${r.result}</span></div>
          </div>
        </div>`;
    });

    document.getElementById("results-section").style.display = "block";

  } catch (e) {
    alert("Connection error: " + e.message);
  } finally {
    btn.disabled = false;
    spinner.style.display = "none";
    btnText.textContent = "▶ Run Login Tests";
  }
}

function toggle(i) {
  const det = document.getElementById("det-" + i);
  const hdr = document.getElementById("hdr-" + i);
  const arr = document.getElementById("arr-" + i);
  det.classList.toggle("open");
  hdr.classList.toggle("open");
}
</script>
</body>
</html>
